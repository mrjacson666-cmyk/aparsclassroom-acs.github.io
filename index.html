<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ACS Lottery Sign Up</title>
  <link rel="icon" type="image/jpeg" href="logo.jpg">


<style>
body {
  margin:0;
  min-height:100vh;
  font-family: Arial;

  background-image:url('all.jpg');
  background-size:cover;
  background-position:center;

  display:flex;
  justify-content:center;
  align-items:center;

  padding:20px;
  box-sizing:border-box;
}

/* CARD */
.card {
  width:340px;
  max-width:95%;
  padding:25px;
  border-radius:15px;
  background:rgba(0,0,0,0.65);
  color:white;
  box-sizing:border-box;
}

/* INPUTS */
input, select {
  width:100%;
  padding:12px;
  margin:6px 0;
  font-size:16px;
  border:none;
  border-radius:6px;
  outline:none;
  box-sizing:border-box;
}

/* BUTTONS */
button {
  width:100%;
  padding:14px;
  margin-top:10px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  font-size:16px;
}

.signup-btn {
  background:#22c55e;
  color:white;
}

.login-btn {
  background:#3b82f6;
  color:white;
}

/* LOADER */
#loader {
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.spinner {
  width:60px;
  height:60px;
  border:6px solid rgba(255,255,255,0.2);
  border-top:6px solid #22c55e;
  border-radius:50%;
  animation:spin 1s linear infinite;
}

@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

/* MOBILE TWEAK */
@media (max-width: 480px) {
  .card {
    padding:20px;
  }
}
</style>

</head>

<body>

<!-- LOADER -->
<div id="loader">
  <div class="spinner"></div>
</div>

<div class="card">

<h2 style="text-align:center;">Sign Up</h2>

<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone (digits only)">
<input id="college" placeholder="College">
<input id="address" placeholder="Address">

<select id="batch">
  <option value="HSC 26">HSC 26</option>
  <option value="HSC 27">HSC 27</option>
</select>

<input id="password" type="password" placeholder="Password">

<button class="signup-btn" onclick="signup()">Sign Up</button>

<hr style="margin:15px 0;opacity:0.2;">

<h2 style="text-align:center;">Login</h2>

<input id="lphone" placeholder="Phone">
<input id="lpassword" type="password" placeholder="Password">

<button class="login-btn" onclick="login()">Login</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } 
from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD8FfIuw1hupcJ1ouDN2vNrRaKnzIL27Pw",
  authDomain: "signup-app-9820a.firebaseapp.com",
  projectId: "signup-app-9820a"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* LOADER */
function show() {
  document.getElementById("loader").style.display = "flex";
}
function hide() {
  document.getElementById("loader").style.display = "none";
}

/* SIGNUP */
window.signup = async function () {

  show();

  try {

    const phone = document.getElementById("phone").value.trim();

    if (!/^\d+$/.test(phone)) {
      alert("Phone must be digits only");
      hide();
      return;
    }

    const users = await getDocs(collection(db, "users"));

    let exists = false;

    users.forEach(u => {
      if (u.data().phone === phone) exists = true;
    });

    if (exists) {
      alert("Phone already exists!");
      hide();
      return;
    }

    const code = "ACS" + Math.floor(100000 + Math.random() * 900000);

    await addDoc(collection(db, "users"), {
      name: document.getElementById("name").value,
      phone: phone,
      college: document.getElementById("college").value,
      address: document.getElementById("address").value,
      batch: document.getElementById("batch").value,
      password: document.getElementById("password").value,
      code: code,
      startTime: Date.now()
    });

    hide();

    localStorage.setItem("userCode", code);
    localStorage.setItem("startTime", Date.now());

    window.location.href = "welcome.html";

  } catch (e) {
    console.error(e);
    hide();
    alert("Signup failed");
  }
};

/* LOGIN */
window.login = async function () {

  show();

  const users = await getDocs(collection(db, "users"));

  let ok = false;

  users.forEach(doc => {
    let u = doc.data();

    if (u.phone === lphone.value && u.password === lpassword.value) {
      ok = true;

      localStorage.setItem("userCode", u.code);
      localStorage.setItem("startTime", u.startTime);
    }
  });

  hide();

  if (ok) {
    window.location.href = "welcome.html";
  } else {
    alert("Wrong login");
  }
};

</script>

</body>
</html>
