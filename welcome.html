<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ACS Welcome</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:Arial;

  background: linear-gradient(135deg,#0f172a,#1e3a8a,#0ea5e9);
  color:white;

  min-height:100vh;

  display:flex;
  justify-content:center;
  align-items:center;

  padding:20px;
  box-sizing:border-box;
}

/* CARD */
.card {
  width:350px;
  max-width:95%;
  text-align:center;

  background:rgba(0,0,0,0.35);
  padding:30px;
  border-radius:20px;

  backdrop-filter: blur(10px);
  box-shadow:0 0 25px rgba(0,0,0,0.5);
}

/* JOIN BUTTON */
.btn {
  margin-top:20px;
  padding:14px 20px;
  background:#22c55e;
  border:none;
  color:white;
  font-size:16px;
  border-radius:10px;
  cursor:pointer;
  width:100%;
}

.btn:hover {
  background:#16a34a;
}

/* BANGLA SCROLL */
.scroll-box {
  margin-top:15px;
  overflow:hidden;
  white-space:nowrap;
  background:rgba(255,255,255,0.12);
  padding:10px;
  border-radius:10px;
}

.scroll-text {
  display:inline-block;
  padding-left:100%;
  font-family:'Noto Sans Bengali', sans-serif;
  font-size:14px;
  font-weight:600;
  animation: scrollLeft 25s linear infinite;
}

@keyframes scrollLeft {
  0% { transform: translateX(0); }
  100% { transform: translateX(-100%); }
}

/* MOBILE FIX */
@media (max-width: 480px) {
  .card {
    padding:20px;
  }

  .scroll-text {
    font-size:13px;
  }
}
</style>

</head>

<body>

<div class="card">

  <h2>Welcome to ACS</h2>

  <!-- BANGLA TEXT -->
  <div class="scroll-box">
    <div class="scroll-text">
      ⚡ ACS-এ আপনাকে স্বাগতম | আপনাকে আগামী ১৫৮ ঘন্টার মধ্যে একটি মেসেজ দেওয়া হবে।সেখানে আপনার  কোডের সাথে মেসেজে প্রদানকৃত ১০ টি কোডের সাথে যে কোনো একটি মিলে গেলে ,আপনি পেতে পারেন একটি ইঞ্জিনিয়ারিং প্রশ্ন ব্যংক।বিস্তারিত ফেসবুকে দেখুন।শুভকামনা আপনাকে ⚡
    </div>
  </div>

  <h3>Your Code</h3>
  <h1 id="code">Loading...</h1>

  <h3 id="timer">Loading...</h3>

  <button class="btn" onclick="joinClass()">
    JOIN CLASS
  </button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_AUTH_DOMAIN",
  projectId: "YOUR_PROJECT_ID"
};

initializeApp(firebaseConfig);

const code = localStorage.getItem("userCode");
const startTime = Number(localStorage.getItem("startTime"));

document.getElementById("code").innerText = code || "NO CODE";

/* JOIN CLASS */
window.joinClass = function () {
  window.location.href =
    "https://aparsclassroom.com/shop/dashboard/login";
};

/* TIMER */
const duration = 158 * 60 * 60 * 1000;

function updateTimer() {

  if (!startTime) {
    document.getElementById("timer").innerText = "NO TIMER DATA";
    return;
  }

  const left = startTime + duration - Date.now();

  if (left <= 0) {
    document.getElementById("timer").innerText = "EXPIRED";
    return;
  }

  const h = Math.floor(left / 3600000);
  const m = Math.floor((left % 3600000) / 60000);
  const s = Math.floor((left % 60000) / 1000);

  document.getElementById("timer").innerText =
    h + "h " + m + "m " + s + "s";

  setTimeout(updateTimer, 1000);
}

updateTimer();

</script>

</body>
</html>
